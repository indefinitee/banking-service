apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplebank-api
  namespace: db
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simplebank-api
  template:
    metadata:
      labels:
        app: simplebank-api
    spec:
      containers:
      - name: api
        image: simplebank:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        env:
        - name: DB_SOURCE
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: DB_SOURCE
        - name: SERVER_ADDRESS
          value: "0.0.0.0:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: simplebank-api
  namespace: db
spec:
  selector:
    app: simplebank-api
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP